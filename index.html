<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>모닝 주식 브리핑</title>
<meta name="description" content="매일 아침 코스피/코스닥 시황과 국내 증시 뉴스를 한눈에 정리해드립니다." />
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈</text></svg>" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <header class="hero">
    <p class="eyebrow">MORNING BRIEFING</p>
    <h1>모닝 주식 브리핑</h1>
    <p class="updated-at" id="updatedAt">불러오는 중…</p>
  </header>

  <section class="card market-card" id="marketSection">
    <h2>시장 개요</h2>
    <div class="index-grid" id="indexGrid">
      <div class="index-skeleton"></div>
      <div class="index-skeleton"></div>
    </div>
  </section>

  <section class="card">
    <div class="section-header">
      <h2>오늘의 급등주</h2>
      <span class="hint">코스피·코스닥 상승률 상위</span>
    </div>
    <ul class="movers-list" id="moversList">
      <li class="skeleton-line"></li>
      <li class="skeleton-line"></li>
    </ul>
  </section>

  <section class="card">
    <h2>오늘의 증시 뉴스</h2>
    <ul class="news-list" id="marketNews">
      <li class="skeleton-line"></li>
      <li class="skeleton-line"></li>
      <li class="skeleton-line"></li>
    </ul>
  </section>

  <section class="card">
    <div class="watchlist-header">
      <h2>관심 종목</h2>
      <span class="hint">종목명을 검색해서 추가해보세요</span>
    </div>

    <form id="watchlistForm" class="watchlist-form" autocomplete="off">
      <input type="text" id="watchlistInput" placeholder="예: 삼성전자, 카카오, NAVER" list="stockSuggestions" />
      <datalist id="stockSuggestions"></datalist>
      <button type="submit">추가</button>
    </form>

    <div class="chips" id="watchlistChips"></div>

    <div id="watchlistNewsContainer"></div>
  </section>

  <footer>
    <p>뉴스는 Google 뉴스 검색 결과를 기반으로 자동 수집되며, 매일 아침 자동으로 갱신됩니다. 투자 조언이 아닌 참고용 정보입니다.</p>
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
