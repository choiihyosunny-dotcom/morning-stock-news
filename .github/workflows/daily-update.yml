name: Daily market update

on:
  schedule:
    # 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch market data
        run: node scripts/fetch-news.mjs

      - name: Commit and push data
        run: |
          git config user.name "morning-stock-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/market.json data/news.json
          git diff --cached --quiet && echo "no changes" || git commit -m "chore: daily market data update"
          git push
